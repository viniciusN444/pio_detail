<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Pio Detail</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="imagens/car-removebg.png" alt="Logo Pio Detail">
        </div>
        <h1>Pio Detail</h1>
    </header>

    <div class="container">
        <section id="novo-servico-container">
            <button id="novoServico">+ Novo Serviço</button>
        </section>

        <section id="painel">
            <div id="servicos-hoje">
                Hoje
                <div id="div-num-hoje">0</div>
            </div>
            <div id="servicos-concluidos">
                Concluído
                <div id="div-num-concluido">0</div>
            </div>
        </section>

        <main>
            <div id="btns">
                <button>Todos</button>
                <button>Pendente</button>
                <button>Em andamento</button>
                <button>Concluído</button>
            </div>

            <div id="lista-agendamentos"></div>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
