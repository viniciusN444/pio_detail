<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Pio Detail</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="imagens/car-removebg.png" alt="Logo Pio Detail">
        </div>
        <h1>Pio Detail</h1>
    </header>

    <div class="container">
        <section id="novo-servico-container">
            <button>+ Novo Serviço</button>
            <div id="servico"></div>
        </section>
        <section id="painel">
            <div id="servicos-hoje">
                Hoje
                <div id="div-num-hoje">1</div>
            </div>
            <div id="servicos-concluidos">
                Concluido
                <div id="div-num-concluido">2</div>
            </div>
        </section>
        <main>
            <div id="btns">
                <button>Todos</button>
                <button>Pendente</button>
                <button>Em Andamento</button>
                <button>Concluido</button>
            </div>
            <div id="lista-agendamentos">
                <div class="cliente">
                    <div class="nome">João</div>
                    <div class="horario">14:00</div>
                    <div class="status">Pendente</div>
                </div>
            </div>
            <div id="btnAddServico">
                <button>+</button>
            </div>
        </main>
    </div>
</body>
</html>
